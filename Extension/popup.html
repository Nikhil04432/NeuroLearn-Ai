<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeuroLearn AI</title>

  <!--
    popup.html — The UI the user sees when they click the extension icon.
    It's just a small HTML page (280px wide) that shows:
    - A loading spinner while scraping
    - Keyword buttons after AI processing
    - Error messages if something goes wrong
  -->

  <script src="popup.js" defer></script>

  <style>
    /* ───────── Base Styles ───────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;   /* Dark navy background */
      color: #e2e8f0;
      width: 300px;
      min-height: 180px;
      padding: 16px;
    }

    /* ───────── Header ───────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header h3 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.3px;
    }

    .header span {
      font-size: 10px;
      color: #94a3b8;
      display: block;
      margin-top: 1px;
    }

    /* ───────── Portal Badge ───────── */
    /* Shows which job site the extension detected (e.g. "LinkedIn") */
    #portalBadge {
      display: none;             /* Hidden until portal is detected */
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1e293b;
      color: #94a3b8;
      margin-bottom: 10px;
      width: fit-content;
    }

    /* ───────── Status Message ───────── */
    /* Small text below header showing what's happening */
    #status {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    #status.error {
      color: #f87171;   /* Red color for errors */
    }

    #status.success {
      color: #4ade80;   /* Green color for success */
    }

    /* ───────── Keywords Container ───────── */
    /* Holds the skill keyword buttons */
    #keywordsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    /* Each clickable keyword button */
    .keyword-button {
      padding: 5px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #cbd5e1;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .keyword-button:hover {
      background: #6366f1;       /* Indigo on hover */
      border-color: #6366f1;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(99, 102, 241, 0.3);
    }

    /* ───────── Loading Spinner ───────── */
    .loading-animation {
      border: 3px solid #1e293b;
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ───────── Footer ───────── */
    .footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #1e293b;
      font-size: 10px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- HEADER: Extension branding -->
  <div class="header">
    <div class="logo">🧠</div>
    <div>
      <h3>NeuroLearn AI</h3>
      <span>Job → Learning Path Generator</span>
    </div>
  </div>

  <!-- PORTAL BADGE: Shows which site was detected (e.g. "🔗 LinkedIn") -->
  <div id="portalBadge">Detecting...</div>

  <!-- STATUS TEXT: Updated dynamically by popup.js -->
  <div id="status">Reading job description...</div>

  <!-- KEYWORDS CONTAINER:
       - Shows loading spinner initially
       - Replaced with keyword buttons after AI processes the job
  -->
  <div id="keywordsContainer">
    <div class="loading-animation"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">Click a skill to start learning on NeuroLearn ↗</div>

</body>
</html>
